<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 150px;
            background-color: #eee;
        }

        .container h1{
            text-align: center;
            margin-top: 50px;
        }
        
        .box{
            width: 50px;
            height: 50px;
            background-color: red;
            padding: 30px;
            border: 5px solid #000;
            margin: 30px;
            position: absolute;
            top: 50px;
            left: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>로고</h1>
    </div>

    <div class="box">
        동해물과 백두산이 마르고 닳도록
    </div>
</body>
</html>
